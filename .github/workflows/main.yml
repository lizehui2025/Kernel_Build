name: 加速版构建 6.6.89 欧加真OKI内核 (测试)

env:
  TZ: Asia/Shanghai
  ANDROID_VERSION: 'android15'
  KERNEL_VERSION: '6.6'
  SUB_VERSION: '89'
  KERNEL_NAME: 'android15-8-g29d86c5fc9dd-abogki428889875-4k'
  CCACHE_KEY: ccache-neov4-6.6.89

on:
  workflow_dispatch:
    inputs:
      DEVICES_NAME:
        description: "请选择要编译的机型："
        required: true
        type: choice
        options:
          - 'oneplus_13'
          - 'oneplus_ace5_pro'
          - 'oneplus_ace_6'
          - 'oneplus_13t'
          - 'oneplus_pad_2_pro'
          - 'oneplus_ace5_ultra'
          - 'realme_GT7'
          - 'realme_GT7pro'
          - 'realme_GT7pro_Speed'
          - 'realme_GT8'
        default: 'oneplus_13'

      keep_original_settings:
        description: "保持原内核名称及构建时间(不懂请保持默认)"
        required: false
        default: true
        type: boolean

      custom_kernel_suffix:
        description: " 自定义内核名称- 仅在取消勾选'保持原设置'时有效(不懂请保持默认)"
        required: false
        default: ''

      custom_kernel_time:
        description: " 自定义构建时间- 仅在取消勾选'保持原设置'时有效(不懂请保持默认)"
        required: false
        default: ''

      ksu_type:
        description: 'KernelSU分支(SukiSU Ultra/ReSukiSU/KernelSU Next/MKSU/KSU(原版)/无内置KSU,默认SukiSU Ultra)'
        required: true
        type: choice
        default: 'none'
        options:
          - 'sukisu'
          - 'resukisu'
          - 'ksunext'
          - 'mksu'
          - 'ksu'
          - 'none'
          
      clang_version:
        description: '选择编译内核的Clang版本'
        required: true
        type: choice
        default: 'clang19'
        options:
          - 'clang19'
          - 'neutron'
          - 'aosp_clang'
          - 'clang20'
          - 'clang18'

      lto_type:
        description: 'LTO 优化等级 (none = 快, thin = 默认, full = 慢)'
        required: true
        type: choice
        default: 'thin'
        options:
          - 'none'
          - 'thin'
          - 'full'

      susfs_enable:
        description: '是否开启susfs(用于增强隐藏环境挂载功能;可能轻微增加耗电，上游更新导致不稳定时或不需要可关闭,该选项与HymoFS冲突)'
        required: true
        type: boolean
        default: 'false'

      kpm_enable:
        description: '是否开启kpm(builtin-使用(re)sukisu内置kpm, kpn-使用独立kpm实现(支持任意KSU/面具环境); 不需要可保持默认关闭)'
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'builtin'
          - 'kpn'

      lz4_enable:
        description: '是否安装 lz4 1.10.0+zstd 1.5.7 补丁'
        required: true
        type: boolean
        default: 'true'

      lz4kd_enable:
        description: '是否安装 LZ4KD 补丁(ZRAM优化)'
        required: true
        type: boolean
        default: 'false'
        
      zram_writeback:
        description: '开启 ZRAM Writeback (更好的内存管理)'
        required: true
        type: boolean
        default: 'false'
        
      schedutil_opt:
        description: '开启 SchedUtil 优化 (提升 CPU 调度器响应)'
        required: true
        type: boolean
        default: 'false'
        
      cpu_opt:
        description: 'CPU 优化 (针对 SM8750 Oryon 核心调优)'
        required: true
        type: boolean
        default: 'true'

      bbr_enable:
        description: "是否启用bbr/brutal算法(false关闭,true加入算法,default启用并设为默认)"
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'
          - 'default'

      adios_enable:
        description: '是否启用ADIOS IO调度器支持(提升IO读写性能)'
        required: true
        type: boolean
        default: 'true'

      rekernel_enable:
        description: '是否启用Re-Kernel支持(提升应用冻结能力)'
        required: true
        type: boolean
        default: 'false'
        
      baseband_guard:
        description: '是否开启内核级基带保护(防格机)'
        required: true
        type: boolean
        default: 'true'

      better_net:
        description: '开启网络功能拓展配置(为ipset/iptables提供支持)'
        required: true
        type: boolean
        default: 'true'
        
      lrng_enable:
        description: '开启 LRNG v59 (提供更好的加密/游戏随机数熵)'
        required: true
        type: boolean
        default: 'false'

      autofdo_enable:
        description: '是否启用 AutoFDO (使用 Google 官方预编译 .afdo 文件优化)'
        required: true
        type: boolean
        default: 'true'

      ccache_debug:
        description: '是否上传 Ccache调试日志'
        required: true
        type: boolean
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEVICES_NAME:           ${{ github.event.inputs.DEVICES_NAME }}
      KEEP_ORIGINAL_SETTINGS: ${{ github.event.inputs.keep_original_settings }}
      CUSTOM_KERNEL_SUFFIX:   ${{ github.event.inputs.custom_kernel_suffix }}
      CUSTOM_KERNEL_TIME:     ${{ github.event.inputs.custom_kernel_time }}
    outputs:
      ksuver: ${{ steps.ksu_version.outputs.ksuver }}
    steps:
      - name: Deep Clean Runner
        run: |
          echo "Starting deep clean..."
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet      
          sudo rm -rf /opt/ghc               
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/share/swift
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force
          echo "Deep clean finished. Current disk space:"
          df -h /

      - name: 配置 Swap 空间 (防止编译内存溢出)
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 24

      - name: ⚙️ Set REPO_MANIFEST (设置对应机型配置文件)
        run: |
          case "${{ env.DEVICES_NAME }}" in
            oneplus_ace5_pro)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_oneplus_ace5_pro" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace5_pro_b" >> $GITHUB_ENV
              ;;
            oneplus_13)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_oneplus_13" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_13_b" >> $GITHUB_ENV
              ;;
            oneplus_ace_6)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_ace_6" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace_6" >> $GITHUB_ENV
              ;;
            oneplus_13t)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_oneplus_13t" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_13t_b" >> $GITHUB_ENV
              ;;
            oneplus_pad_2_pro)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_pad_2_pro" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_pad_2_pro_b" >> $GITHUB_ENV
              ;;
            oneplus_ace5_ultra)
              echo "REPO_MANIFEST=mt6991_b_16.0.0_oneplus_ace5_ultra" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace5_ultra_b" >> $GITHUB_ENV
              ;;
            realme_GT7)
              echo "REPO_MANIFEST=mt6991_b_16.0.0_oneplus_ace5_ultra" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace5_ultra_b" >> $GITHUB_ENV
              ;;
            realme_GT7pro)
              echo "IMAGENAME=Image_Rm_GT_7_Pro" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace_6" >> $GITHUB_ENV
              ;;
            realme_GT7pro_Speed)
              echo "IMAGENAME=Image_Rm_GT_7_Pro_Speed" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace_6" >> $GITHUB_ENV
              ;;
            realme_GT8)
              echo "IMAGENAME=Image_Rm_GT_8" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace_6" >> $GITHUB_ENV
          esac
          if [ -z "${{ github.event.inputs.custom_kernel_suffix }}" ]; then
            case "${{ env.DEVICES_NAME }}" in
             oneplus_pad_2_pro)
                DEFAULT_SUFFIX='-android15-8-g096cdb6ecefc-ab14358676-4k'
              ;;
            oneplus_ace5_ultra)
                DEFAULT_SUFFIX='-android15-8-ge6068c2aa11d-abogki454747580-4k'
              ;;
            oneplus_13 | oneplus_13t | oneplus_ace5_pro | oneplus_ace_6 | realme_GT7 | realme_GT7pro_Speed | realme_GT8)
                DEFAULT_SUFFIX='-android15-8-g7e1f3c083cc6-abogki467167594-4k'
              ;;
            realme_GT7pro)
                DEFAULT_SUFFIX='-android15-8-gf4dc45704e54-abogki446052083-4k'
              ;;
          esac
            echo "DEFAULT_SUFFIX=$DEFAULT_SUFFIX" >> $GITHUB_ENV
            echo "使用原官核名称：$DEFAULT_SUFFIX"
          else
              # 验证用户输入是否以 - 开头
              if [[ "${{ github.event.inputs.custom_kernel_suffix }}" != -* ]]; then
                echo "::warning::自定义内核名称请以 - 开头"
                echo "示例：-android15-8-g096cdb6ecefc-ab14358676-4k"
              fi
            echo "使用自定义名称: ${{ github.event.inputs.custom_kernel_suffix }}"
            echo "DEFAULT_SUFFIX=${{ github.event.inputs.custom_kernel_suffix }}" >> $GITHUB_ENV
          fi
          if [ -z "${{ github.event.inputs.custom_kernel_time }}" ]; then
            case "${{ env.DEVICES_NAME }}" in
              oneplus_pad_2_pro)
                  KERNEL_TIME='Tue Oct 28 09:04:21 UTC 2025'
                ;;
              oneplus_ace5_ultra)
                  KERNEL_TIME='Tue Jul 1 19:48:18 UTC 2025'
                ;;
              oneplus_13 | oneplus_13t | oneplus_ace5_pro | oneplus_ace_6 | realme_GT7 | realme_GT7pro_Speed | realme_GT8)
                  KERNEL_TIME='Mon Dec 8 04:00:43 UTC 2025'
                ;;
              realme_GT7pro)
                  KERNEL_TIME='Fri Sep 19 06:13:40 UTC 2025'
                ;;
            esac
            echo "KERNEL_TIME=$KERNEL_TIME" >> $GITHUB_ENV
            echo "使用官核时间：$KERNEL_TIME"
          else
            echo "使用自定义构建时间: ${{ github.event.inputs.custom_kernel_time }}"
            echo "KERNEL_TIME=${{ github.event.inputs.custom_kernel_time }}" >> $GITHUB_ENV
          fi


      - name: 安装环境依赖+初始化源码仓库及工具链
        run: |
          rm -rf kernel_workspace
          mkdir kernel_workspace
          cd kernel_workspace
          
          sudo apt-mark hold firefox &&
          sudo apt-mark hold libc-bin &&
          sudo apt purge man-db &&
          sudo rm -rf /var/lib/man-db/auto-update &&
          
          sudo apt update &&
          sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev ccache aria2 dos2unix &
          
          echo "正在克隆源码仓库..."
          aria2c -s16 -x16 -k1M https://github.com/cctv18/android_kernel_common_oneplus_sm8750/archive/refs/heads/oneplus/sm8750_v_16.0.0_oneplus_13_6.6.89.zip -o common.zip && 
          unzip -q common.zip && 
          mv "android_kernel_common_oneplus_sm8750-oneplus-sm8750_v_16.0.0_oneplus_13_6.6.89" common &&
          rm -rf common.zip &
          
          # 根据输入选择对应的 Clang 版本
          if [[ ${{ github.event.inputs.clang_version }} == "clang20" ]]; then
            echo "获取 Clang 20..."
            mkdir -p clang18 &&
            curl -L "https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang20-r547379/clang-r547379.zip" -o clang.zip &&
            unzip -q clang.zip -d clang18 &&
            rm -rf clang.zip &
            echo "获取匹配的 Google Build Tools..." &&
            curl -L "https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang20-r547379/build-tools.zip" -o build-tools.zip &&
            unzip -q build-tools.zip &&
            rm -rf build-tools.zip &

          elif [[ ${{ github.event.inputs.clang_version }} == "clang19" ]]; then
          echo "正在克隆llvm-clang19工具链..." &&
          mkdir -p clang19 &&
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/clang-r536225.zip -o clang.zip &&
          unzip -q clang.zip -d clang19 &&
          rm -rf clang.zip &
          
          echo "正在克隆Rust 1.82.0工具链..." &&
          mkdir -p rust &&
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/rust.zip -o rust.zip &&
          unzip -q rust.zip -d rust &&
          rm -rf rust.zip &
          
          echo "正在克隆构建工具..." &&
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/build-tools.zip -o build-tools.zip &&
          unzip -q build-tools.zip &&
          rm -rf build-tools.zip &
          
          elif [[ ${{ github.event.inputs.clang_version }} == "neutron" ]]; then
            echo "获取 Neutron Clang..."
            mkdir -p neutron-clang
            curl -sSL "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman" -o neutron-clang/antman
            cd neutron-clang
            bash antman -S
            cd ..
            echo "获取官方 Google Build Tools..."
            mkdir -p build-tools
            curl -L "https://android.googlesource.com/kernel/prebuilts/build-tools/+archive/refs/heads/main/linux-x86.tar.gz" -o build-tools.tar.gz
            tar -C build-tools -zxf build-tools.tar.gz
            rm -rf build-tools.tar.gz &

          elif [[ ${{ github.event.inputs.clang_version }} == "aosp_clang" ]]; then
            echo "获取 Google AOSP Clang r584948..."
            mkdir -p clang-aosp
            aria2c -s16 -x16 -k1M "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/mirror-goog-main-llvm-toolchain-source/clang-r584948.tar.gz" -o clang.tar.gz
            tar -C clang-aosp -zxf clang.tar.gz
            rm -rf clang.tar.gz &
            echo "获取官方 Google Build Tools..."
            mkdir -p build-tools
            curl -L "https://android.googlesource.com/kernel/prebuilts/build-tools/+archive/refs/heads/main/linux-x86.tar.gz" -o build-tools.tar.gz
            tar -C build-tools -zxf build-tools.tar.gz
            rm -rf build-tools.tar.gz &

          elif [[ ${{ github.event.inputs.clang_version }} == "clang18" ]]; then
            echo "获取 LLVM-Clang18 工具链..." &&
            mkdir -p clang18 &&
            aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/clang-r510928.zip -o clang.zip &&
            unzip -q clang.zip -d clang18 &&
            rm -rf clang.zip &
            echo "获取构建工具..." &&
            aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/build-tools.zip -o build-tools.zip &&
            unzip -q build-tools.zip &&
            rm -rf build-tools.zip &
          fi
          
          wait
          echo "所有源码及工具链初始化完成！"
          echo "正在去除 ABI 保护及 dirty 后缀..."
          rm common/android/abi_gki_protected_exports_* || true
          for f in common/scripts/setlocalversion; do
            sed -i 's/ -dirty//g' "$f"
            sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"
          done

      - name: 提取并配置 Oplus 官方 AutoFDO Profile
        if: inputs.autofdo_enable
        run: |
          echo "正在配置 AutoFDO Profile..."
          cd kernel_workspace
          OPLUS_AFDO_PATH="common/android/gki/aarch64/afdo/kernel.afdo"
          if [ -f "$OPLUS_AFDO_PATH" ]; then
            echo "成功检测到 Oplus 源码自带的 kernel.afdo，完美匹配当前内核，直接提取使用！"
            cp "$OPLUS_AFDO_PATH" kernel_aarch64.afdo
          else
            echo "警告：未在源码目录找到配置文件。尝试从 AOSP 官方仓库拉取作为备选..."
            AOSP_BRANCH="${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}"
            AFDO_URL="https://android.googlesource.com/kernel/common/+/refs/heads/$AOSP_BRANCH/android/gki/aarch64/afdo/kernel.afdo?format=TEXT"
            HTTP_CODE=$(curl -s -w "%{http_code}" -o kernel_afdo_base64.txt "$AFDO_URL")
            if [ "$HTTP_CODE" -eq 200 ]; then
              echo "成功从 AOSP 拉取 $AOSP_BRANCH 分支配置！"
              base64 -d kernel_afdo_base64.txt > kernel_aarch64.afdo
            else
              echo "回退拉取 AOSP mainline 基线配置..."
              FALLBACK_URL="https://android.googlesource.com/kernel/common/+/refs/heads/android-mainline/android/gki/aarch64/afdo/kernel.afdo?format=TEXT"
              FALLBACK_CODE=$(curl -s -w "%{http_code}" -o kernel_afdo_base64_fallback.txt "$FALLBACK_URL")
              if [ "$FALLBACK_CODE" -eq 200 ]; then
                  base64 -d kernel_afdo_base64_fallback.txt > kernel_aarch64.afdo
              else
                  echo "::error::备选 AOSP Profile 也拉取失败！"
                  exit 1
              fi
            fi
            rm -f kernel_afdo_base64*.txt
          fi
          if [ -s kernel_aarch64.afdo ]; then
            echo "AutoFDO 配置文件就绪！"
          else
            echo "::error::AutoFDO 配置文件提取或下载失败，文件为空！"
            exit 1
          fi

      - name: 添加KernelSU
        id: ksu_version
        run: |
          cd kernel_workspace
          if [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            echo "正在配置SukiSU Ultra..."
            curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/refs/heads/main/kernel/setup.sh" | bash -s builtin
            cd ./KernelSU
            GIT_COMMIT_HASH=$(git rev-parse --short=8 HEAD)
            for i in {1..3}; do
              KSU_API_VERSION=$(curl -s "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/builtin/kernel/Kbuild" | grep -m1 "KSU_VERSION_API :=" | awk -F'= ' '{print $2}' | tr -d '[:space:]')
              [ -n "$KSU_API_VERSION" ] && break || sleep 1
            done
            [ -z "$KSU_API_VERSION" ] && KSU_API_VERSION="3.1.7"
            VERSION_DEFINITIONS=$'define get_ksu_version_full\nv\\$1-'"$GIT_COMMIT_HASH"$'@cctv18\nendef\n\nKSU_VERSION_API := '"$KSU_API_VERSION"$'\nKSU_VERSION_FULL := v'"$KSU_API_VERSION"$'-'"$GIT_COMMIT_HASH"$'@cctv18'
            sed -i '/define get_ksu_version_full/,/endef/d' kernel/Kbuild
            sed -i '/KSU_VERSION_API :=/d' kernel/Kbuild
            sed -i '/KSU_VERSION_FULL :=/d' kernel/Kbuild
            awk -v def="$VERSION_DEFINITIONS" '/REPO_OWNER :=/ {print; print def; inserted=1; next} 1 END {if (!inserted) print def}' kernel/Kbuild > kernel/Kbuild.tmp && mv kernel/Kbuild.tmp kernel/Kbuild
            KSU_VERSION=$(expr $(git rev-list --count main) + 37185 2>/dev/null || echo 114514)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
            echo "SukiSU版本号: v${KSU_API_VERSION}-${GIT_COMMIT_HASH}@cctv18"
          elif [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]]; then
            echo "正在配置ReSukiSU..."
            curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/refs/heads/main/kernel/setup.sh" | bash -s main
            echo 'CONFIG_KSU_FULL_NAME_FORMAT="%TAG_NAME%-%COMMIT_SHA%@cctv18"' >> ./common/arch/arm64/configs/gki_defconfig
            cd ./KernelSU
            KSU_VERSION=$(expr $(git rev-list --count main) + 30700 2>/dev/null || echo 114514)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]]; then
            echo "正在配置KernelSU Next..."
            curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/dev-susfs/kernel/setup.sh" | bash -s dev-susfs
            cd KernelSU-Next
            rm -rf .git
            KSU_VERSION=$(expr $(curl -sI "https://api.github.com/repos/pershoot/KernelSU-Next/commits?sha=dev&per_page=1" | grep -i "link:" | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p') "+" 30000)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
            sed -i "s/KSU_VERSION_FALLBACK := 1/KSU_VERSION_FALLBACK := $KSU_VERSION/g" kernel/Kbuild
            KSU_GIT_TAG=$(curl -sL "https://api.github.com/repos/KernelSU-Next/KernelSU-Next/tags" | grep -o '"name": *"[^"]*"' | head -n 1 | sed 's/"name": "//;s/"//')
            sed -i "s/KSU_VERSION_TAG_FALLBACK := v0.0.1/KSU_VERSION_TAG_FALLBACK := $KSU_GIT_TAG/g" kernel/Kbuild
            cd ../common/drivers/kernelsu
            wget https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/other_patch/apk_sign.patch
            patch -p2 -N -F 3 < apk_sign.patch || true
          elif [[ ${{ github.event.inputs.ksu_type }} == "mksu" ]]; then
            echo "正在配置 MKSU (5ec1cff/KernelSU)..."
            curl -LSs "https://raw.githubusercontent.com/5ec1cff/KernelSU/refs/heads/main/kernel/setup.sh" | bash -s main
            cd ./KernelSU
            KSU_VERSION=$(expr $(curl -sI "https://api.github.com/repos/5ec1cff/KernelSU/commits?sha=main&per_page=1" | grep -i "link:" | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p') "+" 30000)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
            sed -i "s/DKSU_VERSION=16/DKSU_VERSION=${KSU_VERSION}/" kernel/Kbuild
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            echo "正在配置原版 KernelSU (tiann/KernelSU)..."
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/refs/heads/main/kernel/setup.sh" | bash -s main
            cd ./KernelSU
            KSU_VERSION=$(expr $(curl -sI "https://api.github.com/repos/tiann/KernelSU/commits?sha=main&per_page=1" | grep -i "link:" | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p') "+" 30000)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
            sed -i "s/DKSU_VERSION=16/DKSU_VERSION=${KSU_VERSION}/" kernel/Kbuild
          else
            echo "已选择无内置KernelSU模式，跳过KernelSU配置..."
          fi

      - name: 应用 KernelSU & SUSFS 补丁
        if: inputs.susfs_enable
        run: |
          cd kernel_workspace
          if [[ ${{ github.event.inputs.ksu_type }} == "sukisu" || ${{ github.event.inputs.ksu_type }} == "resukisu" || ${{ github.event.inputs.ksu_type }} == "ksunext" ]]; then
            echo "正在添加KSU类型对应补丁..."
            git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}
            wget https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/other_patch/69_hide_stuff.patch -O ./common/69_hide_stuff.patch
            cp ./susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch ./common/
            cp ./susfs4ksu/kernel_patches/fs/* ./common/fs/
            cp ./susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
            cd ./common
            patch -p1 < 50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch || true
            [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]] && sed -i 's|vma = find_vma(mm|struct vm_area_struct *\&|' ./fs/proc/task_mmu.c
            patch -p1 -N -F 3 < 69_hide_stuff.patch || true
          elif [[ ${{ github.event.inputs.ksu_type }} == "mksu" || ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            echo "正在为 MKSU/KSU 添加补丁..."
            git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}
            wget https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/other_patch/69_hide_stuff.patch -O ./common/69_hide_stuff.patch
            cp ./susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./KernelSU/
            PATCH_FILE="./KernelSU/10_enable_susfs_for_ksu.patch"
            if grep -q "a/kernel/Makefile" "$PATCH_FILE"; then
              sed -i 's|kernel/Makefile|kernel/Kbuild|g' "$PATCH_FILE"
              sed -i 's|^@@ .* format:.*|@@ -94,4 +94,13 @@|' "$PATCH_FILE"
              sed -i 's|.*check-format:.*|ccflags-y += -Wno-strict-prototypes -Wno-int-conversion -Wno-gcc-compat -Wno-missing-prototypes|' "$PATCH_FILE"
              sed -i 's|.*clang-format --dry-run.*|ccflags-y += -Wno-declaration-after-statement -Wno-unused-function -Wno-unused-variable|' "$PATCH_FILE"
            fi
            cp ./susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch ./common/
            cp ./susfs4ksu/kernel_patches/fs/* ./common/fs/
            cp ./susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
            cd ./KernelSU
            patch -p1 < 10_enable_susfs_for_ksu.patch || true
            [[ ${{ github.event.inputs.ksu_type }} == "mksu" ]] && wget https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/other_patch/mksu_supercalls.patch && patch -p1 < mksu_supercalls.patch || true
            cd ../common
            patch -p1 < 50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch || true
            patch -p1 -N -F 3 < 69_hide_stuff.patch || true
          fi


      - name: 🔧 Setup Patches | 配置补丁
        run: |
          cd kernel_workspace

          echo "⬇️ 克隆所需补丁..."

          git clone https://github.com/mrcxlinux/kernel_patches.git

          echo "📝 复制补丁文件..."

          cd ./common

          cp ../kernel_patches/common/EnablePOLLY.patch ./

          echo "📦 正在启用POLLY支持..."
          git apply -p1 < EnablePOLLY.patch || true

      - name: 应用lz4 1.10.0 & zstd 1.5.7补丁
        if: inputs.lz4_enable
        run: |
          echo "正在添加lz4 1.10.0 & zstd 1.5.7补丁…"
          cd kernel_workspace
          git clone --depth=1 https://github.com/cctv18/oppo_oplus_realme_sm8750.git
          cp ./oppo_oplus_realme_sm8750/zram_patch/001-lz4.patch ./common/
          cp ./oppo_oplus_realme_sm8750/zram_patch/lz4armv8.S ./common/lib
          cp ./oppo_oplus_realme_sm8750/zram_patch/002-zstd.patch ./common/
          cd ./common
          git apply -p1 < 001-lz4.patch || true
          patch -p1 < 002-zstd.patch || true

      - name: 应用 lz4kd 补丁
        if: inputs.lz4kd_enable
        run: |
          echo "正在添加lz4kd补丁…"
          cd kernel_workspace
          if [ ! -d "SukiSU_patch" ]; then
            git clone --depth=1 https://github.com/ShirkNeko/SukiSU_patch.git
          fi
          cd common
          cp -r ../SukiSU_patch/other/zram/lz4k/include/linux/* ./include/linux/
          cp -r ../SukiSU_patch/other/zram/lz4k/lib/* ./lib
          cp -r ../SukiSU_patch/other/zram/lz4k/crypto/* ./crypto
          cp ../SukiSU_patch/other/zram/zram_patch/${{ env.KERNEL_VERSION }}/lz4kd.patch ./
          patch -p1 -F 3 < lz4kd.patch || true
      
      - name: 添加SUSFS 配置项
        if: inputs.susfs_enable
        run: |
          cd kernel_workspace
          echo "CONFIG_KSU_SUSFS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> ./common/arch/arm64/configs/gki_defconfig
          
      - name: 添加 KSU & 其他配置项
        run: |
          cd kernel_workspace
          echo "CONFIG_KSU=y" >> ./common/arch/arm64/configs/gki_defconfig
          if [[ ${{ github.event.inputs.kpm_enable }} == 'builtin' && ( "${{ github.event.inputs.ksu_type }}" == "sukisu" || "${{ github.event.inputs.ksu_type }}" == "resukisu" ) ]]; then
            echo "CONFIG_KPM=y" >> ./common/arch/arm64/configs/gki_defconfig
          fi
          if [[ "${{ github.event.inputs.susfs_enable }}" == "false" ]]; then
            echo "CONFIG_KSU_SUSFS=n" >> ./common/arch/arm64/configs/gki_defconfig
          fi
          echo "CONFIG_TMPFS_XATTR=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TMPFS_POSIX_ACL=y" >> ./common/arch/arm64/configs/gki_defconfig
          if [[ "${{ github.event.inputs.lz4kd_enable }}" == "true" ]]; then
            echo "CONFIG_ZSMALLOC=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_CRYPTO_LZ4HC=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_CRYPTO_LZ4K=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_CRYPTO_LZ4KD=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_CRYPTO_842=y" >> ./common/arch/arm64/configs/gki_defconfig
          fi
          echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y" >> ./common/arch/arm64/configs/gki_defconfig
          sed -i 's/check_defconfig//' ./common/build.config.gki
          echo "CONFIG_HEADERS_INSTALL=n" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KASAN=n" >> ./common/arch/arm64/configs/gki_defconfig

          echo "CONFIG_LLVM_POLLY=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_LD_DEAD_CODE_DATA_ELIMINATION=y" >> ./common/arch/arm64/configs/gki_defconfig
          
          if [[ "${{ github.event.inputs.autofdo_enable }}" == "true" ]]; then
            echo "CONFIG_AUTOFDO_CLANG=y" >> ./common/arch/arm64/configs/gki_defconfig
          fi
            
      - name: 启用网络功能增强优化配置
        if: inputs.better_net
        run: |
          cd kernel_workspace
          echo "CONFIG_BPF_STREAM_PARSER=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_NETFILTER_XT_SET=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_MAX=65534" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_BITMAP_IP=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_BITMAP_IPMAC=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_BITMAP_PORT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_IP=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_IPMARK=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_IPPORT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_IPPORTIP=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_IPPORTNET=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_IPMAC=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_MAC=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_NETPORTNET=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_NET=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_NETNET=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_NETPORT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_NETIFACE=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_LIST_SET=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP6_NF_NAT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP6_NF_TARGET_MASQUERADE=y" >> ./common/arch/arm64/configs/gki_defconfig
          cd common
          wget https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/other_patch/config.patch
          patch -p1 -F 3 < config.patch || true

      - name: 添加 BBR 等一系列拥塞控制算法
        if: inputs.bbr_enable != 'false'
        run: |
          echo "正在添加BBR等拥塞控制算法..."
          cd kernel_workspace
          echo "CONFIG_TCP_CONG_ADVANCED=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_BBR=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_CUBIC=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_VEGAS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_NV=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_WESTWOOD=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_HTCP=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_BRUTAL=y" >> ./common/arch/arm64/configs/gki_defconfig
          if [[ "${{ github.event.inputs.bbr_enable }}" == "default" ]]; then
            echo "正在将BBR设为默认拥塞控制算法..."
            # 1. 显式禁用原有的默认 CUBIC 算法
            sed -i 's/CONFIG_DEFAULT_CUBIC=y/# CONFIG_DEFAULT_CUBIC is not set/g' ./common/arch/arm64/configs/gki_defconfig
            # 2. 开启 DEFAULT_BBR 选项
            echo "CONFIG_DEFAULT_BBR=y" >> ./common/arch/arm64/configs/gki_defconfig
            # 3. 写入带有双引号的字符串（注意外面用单引号，里面用双引号）
            echo 'CONFIG_DEFAULT_TCP_CONG="bbr"' >> ./common/arch/arm64/configs/gki_defconfig
          else
            echo "正在将CUBIC设为默认拥塞控制算法..."
            echo "CONFIG_DEFAULT_CUBIC=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo 'CONFIG_DEFAULT_TCP_CONG="cubic"' >> ./common/arch/arm64/configs/gki_defconfig
          fi

      - name: 启用ADIOS IO调度器
        if: inputs.adios_enable
        run: |
          echo "正在启用ADIOS IO调度器(降低I/O延迟)…"
          cd kernel_workspace
          echo "CONFIG_MQ_IOSCHED_ADIOS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_MQ_IOSCHED_DEFAULT_ADIOS=y" >> ./common/arch/arm64/configs/gki_defconfig

      - name: 启用Re-Kernel支持
        if: inputs.rekernel_enable
        run: |
          echo "正在启用Re-Kernel支持(提升冻结后台能力)…"
          cd kernel_workspace
          echo "CONFIG_REKERNEL=y" >> ./common/arch/arm64/configs/gki_defconfig

      - name: 启用内核级基带保护
        if: inputs.baseband_guard
        run: |
          echo "正在启用内核级基带保护支持…"
          cd kernel_workspace
          echo "CONFIG_BBG=y" >> ./common/arch/arm64/configs/gki_defconfig
          cd ./common
          curl -sSL https://github.com/cctv18/Baseband-guard/raw/master/setup.sh | bash
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig

      - name: 配置 LTO
        run: |
          cd kernel_workspace
          if [[ "${{ github.event.inputs.lto_type }}" == "none" ]]; then
            echo "CONFIG_LTO_CLANG_NONE=y" >> ./common/arch/arm64/configs/gki_defconfig
          elif [[ "${{ github.event.inputs.lto_type }}" == "full" ]]; then
            echo "CONFIG_LTO_CLANG_FULL=y" >> ./common/arch/arm64/configs/gki_defconfig
          else
            echo "CONFIG_LTO_CLANG_THIN=y" >> ./common/arch/arm64/configs/gki_defconfig
          fi

      - name: 配置 ZRAM Writeback
        if: inputs.zram_writeback
        working-directory: kernel_workspace
        run: |
          echo "Enabling ZRAM Writeback support..."
          echo "CONFIG_ZRAM_WRITEBACK=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_ZRAM_MEMORY_TRACKING=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_ZRAM_MULTI_COMP=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_ZRAM_DEF_COMP_LZ4=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo 'CONFIG_ZRAM_DEF_COMP="lz4"' >> ./common/arch/arm64/configs/gki_defconfig

      - name: 配置 SchedUtil 优化
        if: inputs.schedutil_opt
        working-directory: kernel_workspace
        run: |
          echo "Applying SchedUtil optimizations..."
          echo "CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL=y" >> ./common/arch/arm64/configs/gki_defconfig
           
          SU_C="common/kernel/sched/cpufreq_schedutil.c"
          if [ -f "$SU_C" ]; then
            sed -i 's/LATENCY_MULTIPLIER\s*=\s*1000/LATENCY_MULTIPLIER = 1000/' "$SU_C" 2>/dev/null || true
          fi

      - name: 准备 CPU 优化 (Oryon SM8750)
        if: inputs.cpu_opt
        run: |
          echo "Setting up CPU tuning..."
          cd kernel_workspace
          echo "CONFIG_ARM64_ERRATUM_2658417=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_ARCH_QCOM=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_HZ_300=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_PREEMPT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_NO_HZ_IDLE=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_RCU_LAZY_DEFAULT_OFF=n" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_WQ_POWER_EFFICIENT_DEFAULT=y" >> ./common/arch/arm64/configs/gki_defconfig

      - name: 启用 LRNG v60
        if: inputs.lrng_enable
        working-directory: kernel_workspace/common
        run: |
          echo "Enabling LRNG (Linux Random Number Generator) via v60 backports for v6.6..."
          
          # 1. 克隆源码到临时目录
          git clone --depth=1 https://github.com/smuellerDD/lrng.git /tmp/lrng_src
          
          echo "Applying LRNG v60 kernel patches for Linux 6.6..."

          # 第 1 步：应用所有 6 位数字的前置环境补丁
          for patch_file in $(ls /tmp/lrng_src/backports/v60-6.6.119/*-0000*.patch | sort); do
            echo "Step 1 - Applying: $(basename "$patch_file")"
            patch -p1 -F 3 --no-backup-if-mismatch < "$patch_file" || true
          done

          # 第 2 步：应用 v60 针对 Linux 6.18 的主体补丁
          for patch_file in $(ls /tmp/lrng_src/kernel_patches/v6.18/*.patch | sort); do
            echo "Step 2 - Applying: $(basename "$patch_file")"
            patch -p1 -F 3 --no-backup-if-mismatch < "$patch_file" || true
          done

          # 第 3 步：应用所有 2 位数字的适配兼容补丁
          for patch_file in $(ls /tmp/lrng_src/backports/v60-6.6.119/*-[0-9][0-9]-*.patch | sort); do
            echo "Step 3 - Applying: $(basename "$patch_file")"
            patch -p1 -F 3 --no-backup-if-mismatch < "$patch_file" || true
          done

          cd ..

          # 写入相关 GKI 配置
          echo "CONFIG_LRNG=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_LRNG_SHA256=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_LRNG_COLLECTION_SIZE=1024" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_LRNG_HEALTH_TESTS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_LRNG_RCT_CUTOFF=31" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_LRNG_APT_CUTOFF=325" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_LRNG_IRQ=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_LRNG_CONTINUOUS_COMPRESSION_ENABLED=y" >> ./common/arch/arm64/configs/gki_defconfig

      - name: 🔧 Set Kernel name (设置内核名称)
        run: |
          cd kernel_workspace
          echo "内核后缀: $DEFAULT_SUFFIX"
          ESCAPED_SUFFIX=$(printf '%s\n' "$DEFAULT_SUFFIX" | sed 's:[\/&]:\\&:g')
          sudo sed -i "s/-4k/$ESCAPED_SUFFIX/g" ./common/arch/arm64/configs/gki_defconfig
          sed -i 's/${scm_version}//' ./common/scripts/setlocalversion

      - name: Isolate KVM nvhe from global PGO/LTO optimizations
        # 如果你的内核源码在一个子目录中（例如 GKI 常见的 common/ 目录），请启用并修改 working-directory
        working-directory: kernel_workspace/common
        run: |
          MAKEFILE_PATH="arch/arm64/kvm/hyp/nvhe/Makefile"
          
          if [ -f "$MAKEFILE_PATH" ]; then
            echo "正在向 $MAKEFILE_PATH 注入优化隔离规则..."
            # 在 Makefile 第一行注入 filter-out 规则，剔除 AutoFDO 和 LTO 参数
            sed -i 's|cmd_hyprel =|cmd_hyprel = $(OBJCOPY) --remove-section=".rel.llvm.call-graph-profile" $< \&\& |' arch/arm64/kvm/hyp/nvhe/Makefile.nvhe
            echo "注入完成。"
          else
            echo "错误：未找到目标 Makefile，请检查相对路径是否正确。"
            exit 1
          fi



      - name: 构建内核
        run: |
          WORKDIR="$(pwd)"
          export PATH="/usr/lib/ccache:$PATH"
          
          # 根据选择的工具链动态配置路径
          if [[ "${{ github.event.inputs.clang_version }}" == "clang19" ]]; then
            export PATH="$WORKDIR/kernel_workspace/clang19/bin:$PATH"
            export PATH="$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
            export PATH="$WORKDIR/kernel_workspace/rust/bin:$PATH"
            export CLANG_DIR="$WORKDIR/kernel_workspace/clang19/bin"
          elif [[ "${{ github.event.inputs.clang_version }}" == "aosp_clang" ]]; then
            export PATH="$WORKDIR/kernel_workspace/clang-aosp/bin:$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
            export CLANG_DIR="$WORKDIR/kernel_workspace/clang-aosp/bin"
          elif [[ "${{ github.event.inputs.clang_version }}" == "neutron" ]]; then
            export PATH="$WORKDIR/kernel_workspace/neutron-clang/bin:$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
            export CLANG_DIR="$WORKDIR/kernel_workspace/neutron-clang/bin"
          else
            export PATH="$WORKDIR/kernel_workspace/clang18/bin:$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
            export CLANG_DIR="$WORKDIR/kernel_workspace/clang18/bin"
          fi
          
          CLANG_VERSION="$($CLANG_DIR/clang --version | head -n 1)"
          LLD_VERSION="$($CLANG_DIR/ld.lld --version | head -n 1)"
          
          echo "编译器信息:"
          echo "Clang版本: $CLANG_VERSION"
          echo "LLD版本: $LLD_VERSION"
          pahole_version=$(pahole --version 2>/dev/null | head -n1)
          [ -z "$pahole_version" ] && echo "pahole版本：未安装" || echo "pahole版本：$pahole_version"
          
          export CCACHE_LOGFILE="${{ github.workspace }}/kernel_workspace/ccache.log"
          
          cd kernel_workspace/common
          
          # 异步清理磁盘空间
          sudo rm -rf /usr/share/dotnet &
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /opt/ghc &
          sudo rm -rf /opt/hostedtoolcache/CodeQL &
          
          export KBUILD_BUILD_TIMESTAMP="${KERNEL_TIME}"
          
          # 核心编译参数区
          # KCFLAGS 走 clang driver，可以使用 -mllvm
          ML_FLAGS="-mllvm -regalloc-enable-advisor=release -mllvm -enable-ml-inliner=release -mllvm -enable-ext-tsp-block-placement=1"
          OPT_KCFLAGS="-O3 -fno-strict-aliasing $ML_FLAGS -Wno-error"
          
          # KBUILD_LDFLAGS 直接传给 ld.lld，不能使用 -Wl,
          # 保留较稳的 LTO/链接优化，删除风险较高或兼容性较差的 LTO 内部 pass
          OPT_LDFLAGS="--sort-section=alignment --lto-O3"
          
          if [ "${{ github.event.inputs.autofdo_enable }}" == "true" ]; then
            echo "--- 正在将 AutoFDO Profile 注入编译器与链接器 ---"
            AFDO_FILE="$WORKDIR/kernel_workspace/kernel_aarch64.afdo"
            export CLANG_AUTOFDO_PROFILE="$AFDO_FILE"
            OPT_KCFLAGS="$OPT_KCFLAGS -fprofile-sample-use=$AFDO_FILE"
            OPT_LDFLAGS="$OPT_LDFLAGS -mllvm -sample-profile-file=$AFDO_FILE"
          fi
          
          OPLUS_KMI_LIST="android/abi_gki_aarch64_oplus"
          if [ -f "$OPLUS_KMI_LIST" ]; then
            echo "✅ 检测到 KMI 符号表: $OPLUS_KMI_LIST"
            export ABI_FLAGS="KMI_SYMBOL_LIST=$OPLUS_KMI_LIST KMI_SYMBOL_LIST_STRICT=1"
          else
            export ABI_FLAGS=""
          fi
          
          echo "--- 开始生成内核配置 ---"
          make -j$(nproc --all) \
            LLVM=1 LLVM_IAS=1 \
            ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            HOSTLD=ld.lld \
            O=out \
            gki_defconfig
          
          echo "--- 开始编译内核镜像 ---"
          make -j$(nproc --all) \
            LLVM=1 LLVM_IAS=1 \
            ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            HOSTLD=ld.lld \
            O=out \
            KCFLAGS="$OPT_KCFLAGS ${EXTRA_CFLAGS:-}" \
            KBUILD_LDFLAGS="$OPT_LDFLAGS" \
            $ABI_FLAGS \
            Image
          
          echo "内核编译完成！"
          df -h

      - name: 应用KPM并修补内核
        run: |
          if [[ ${{ github.event.inputs.kpm_enable }} == 'builtin' && ( "${{ github.event.inputs.ksu_type }}" == "sukisu" || "${{ github.event.inputs.ksu_type }}" == "resukisu" ) ]]; then
            echo "正在应用KPM并修补内核..."
            cd kernel_workspace/common/out/arch/arm64/boot
            curl -LO https://github.com/SukiSU-Ultra/SukiSU_KernelPatch_patch/releases/latest/download/patch_linux
            chmod +x patch_linux
            ./patch_linux
            rm -f Image
            mv oImage Image
          fi
          
      - name: 克隆 AnyKernel3 并打包
        run: |
          cd kernel_workspace
          git clone https://github.com/cctv18/AnyKernel3 --depth=1
          rm -rf ./AnyKernel3/.git
          cd AnyKernel3
          cp ../common/out/arch/arm64/boot/Image ./Image
          if [[ ! -f ./Image ]]; then
            echo "未找到内核镜像文件，构建可能出错"
            exit 1
          fi
          if [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            KSU_TYPENAME="SukiSU"
          elif [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]]; then
            KSU_TYPENAME="ReSukiSU"
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]]; then
            KSU_TYPENAME="KSUNext"
          elif [[ ${{ github.event.inputs.ksu_type }} == "mksu" ]]; then
            KSU_TYPENAME="MKSU"
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            KSU_TYPENAME="KSU"
          else
            KSU_TYPENAME="none"
          fi
          if [[ "${{ github.event.inputs.lz4kd_enable }}" == "true" ]]; then
            wget https://raw.githubusercontent.com/cctv18/oppo_oplus_realme_sm8750/refs/heads/main/zram.zip
          fi
          if [[ ${{ github.event.inputs.kpm_enable }} == 'kpn' ]]; then
            wget https://github.com/cctv18/KPatch-Next/releases/latest/download/kpn.zip
          fi
          if [[ -n "${{ github.event.inputs.kernel_suffix }}" ]]; then
            zip -r ../AnyKernel3_${KSU_TYPENAME}_${{ env.KSUVER }}_${{ env.KERNEL_VERSION }}_A15_${{ github.event.inputs.kernel_suffix }}.zip ./*
          else
            zip -r ../AnyKernel3_${KSU_TYPENAME}_${{ env.KSUVER }}_${{ env.KERNEL_VERSION }}_A15_${{ env.KERNEL_NAME }}.zip ./*
          fi

      - name: 上传 Ccache 调试日志
        if: always() && inputs.ccache_debug
        uses: actions/upload-artifact@v4
        with:
          name: ccache-debug-log
          path: ${{ github.workspace }}/kernel_workspace/ccache.log

      - name: 上传 ZIP 工件
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_ZIP_Artifacts
          path: ${{ github.workspace }}/kernel_workspace/AnyKernel*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: read

    steps:
      - name: 下载 ZIP 工件
        uses: actions/download-artifact@v4
        with:
          name: Kernel_ZIP_Artifacts
          path: ./release_zips

      - name: 设置环境变量
        run: |
          if [[ -n "${{ github.event.inputs.kernel_suffix }}" ]]; then
            FULL_VERSION=${{ format('{0}.89-{1}', env.KERNEL_VERSION, github.event.inputs.kernel_suffix) }}
            echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV
            export FULL_VERSION=$FULL_VERSION
          else
            FULL_VERSION=${{ format('{0}.89-{1}', env.KERNEL_VERSION, env.KERNEL_NAME) }}
            echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV
            export FULL_VERSION=$FULL_VERSION
          fi
          TIME="$(TZ='Asia/Shanghai' date +'%y%m%d%H%M%S')"
          TIME_FORM="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          echo "TIME=$TIME" >> $GITHUB_ENV
          echo "TIME_FORM=$TIME_FORM" >> $GITHUB_ENV
          TAG_HEAD="OPPO+OPlus+Realme-A15-build"
          echo "TAG_HEAD=$TAG_HEAD" >> $GITHUB_ENV
          if [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            KSU_TYPENAME="SukiSU Ultra"
          elif [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]]; then
            KSU_TYPENAME="ReSukiSU"
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]]; then
            KSU_TYPENAME="KernelSU Next"
          elif [[ ${{ github.event.inputs.ksu_type }} == "mksu" ]]; then
            KSU_TYPENAME="MKSU"
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            KSU_TYPENAME="KSU"
          else
            KSU_TYPENAME="无内置KSU"
          fi
          echo "KSU_TYPENAME=$KSU_TYPENAME" >> $GITHUB_ENV
         
      - name: 创建发布
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "${{ env.TAG_HEAD }}-${{ env.TIME }}"
          name: "${{ env.TAG_HEAD }}-${{ env.FULL_VERSION }}"
          body: |
            ### 📱 欧加真 ${{ env.KSU_TYPENAME }} SM8750 通用内核 | 构建信息
            - 内核版本号: ${{ env.FULL_VERSION }}
            - 编译时间: ${{ env.TIME_FORM }}
            - 机型：欧加真骁龙8Elite通用 6.6.89 内核（基于一加13国际版 6.6.89 版官方OKI源码）
            - 编译器：${{ github.event.inputs.clang_version }} (LTO 等级：${{ github.event.inputs.lto_type }})
            - 特性：${{ env.KSU_TYPENAME }}
            - SuSFS支持：${{ github.event.inputs.susfs_enable }}
            - KPM支持 ：${{ github.event.inputs.kpm_enable }}
            - LZ4/LZ4KD支持：${{ github.event.inputs.lz4_enable }} / ${{ github.event.inputs.lz4kd_enable }}
            - 风驰调度优化：${{ github.event.inputs.fengchi }}
            - SchedUtil/CPU 优化：${{ github.event.inputs.schedutil_opt }} / ${{ github.event.inputs.cpu_opt }}
            - F2FS 存储优化：${{ github.event.inputs.f2fs_opt }}
            - Wakelock Blocker：${{ github.event.inputs.wakelock_blocker }}
            - 网络功能增强/WireGuard/Netfilter：${{ github.event.inputs.better_net }} / ${{ github.event.inputs.wireguard }} / ${{ github.event.inputs.netfilter_full }}
            - BBR/Brutal 拥塞控制算法支持：${{ github.event.inputs.bbr_enable }}
            - ADIOS IO调度器支持：${{ github.event.inputs.adios_enable }}
            - Re-Kernel支持：${{ github.event.inputs.rekernel_enable }}
            - 基础防护：防格机(${{ github.event.inputs.baseband_guard }}) | 路径穿越修复(${{ github.event.inputs.unicode_fix }}) | LRNG v59(${{ github.event.inputs.lrng_enable }})
            
            - SukiSU Ultra管理器下载：[SukiSU-Ultra](https://github.com/SukiSU-Ultra/SukiSU-Ultra/releases)
            - KernelSU Next管理器下载：[KernelSU-Next](https://github.com/KernelSU-Next/KernelSU-Next/releases)
            - MKSU管理器下载：[Magic-KernelSU](https://github.com/5ec1cff/KernelSU/actions)
            - KSU原版管理器下载：[KernelSU](https://github.com/tiann/KernelSU/releases)
            
            ### ⏫️ 更新内容：
            - 更新${{ env.KSU_TYPENAME }}至最新版本（${{ needs.build.outputs.ksuver }}）
            - 融合了 SukiSU Ultra 的全系深度优化和补丁
            
            ### 📋 安装方法 | Installation Guide
            1. 若你的手机已经安装了第三方Recovery（如TWRP)，可下载对应机型的AnyKernel刷机包后进入Recovery模式，通过Recovery刷入刷机包后重启设备；
            2. 若你的手机之前已有 root 权限，可在手机上安装[HorizonKernelFlasher](https://github.com/libxzr/HorizonKernelFlasher/releases)，在HorizonKernelFlasher中刷入AnyKernel刷机包并重启；
            3. 若你之前已刷入SukiSU Ultra内核，且SukiSU Ultra管理器已更新至最新版本，可在SukiSU Ultra管理器中直接刷入AnyKernel刷机包并重启；
            4. 刷入无lz4kd补丁版的内核前若刷入过lz4kd补丁版的内核，为避免出错，请先关闭zram模块；
            5. 由于KernelSU上游更新了元模块功能，最新版KSU管理器需要配合元模块才能正常挂载模块。目前的元模块包括 meta overlayfs, mountify, meta magicmount 等。
            6. KernelPatch Next（即KPN）是一个独立于KSU的KPM实现，不能与(Re)SukiSU内置的kpm功能共同使用。
            
            #### ※※※刷写内核有风险，为防止出现意外导致手机变砖，在刷入内核前请务必用KernelFlasher等软件备份boot等关键启动分区!※※※
          draft: false
          prerelease: false
          files: |
            release_zips/AnyKernel3_*.zip
